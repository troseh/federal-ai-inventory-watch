name: inventory-watch

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run inventory pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run.py --run
      - name: Watch agency pages
        run: python run.py --pages
      - name: Commit results
        run: |
          git config user.name "inventory-watch bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data changelogs CHANGELOG.md
          git diff --cached --quiet || git commit -m "watch: $(date -u +%F) update"
          git push
