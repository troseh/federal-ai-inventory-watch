# Agency AI governance pages under watch. Add entries as more compliance
# plans, waiver summaries, and determination pages are located.
# Per OMB guidance, compliance plans are to be posted at [agency].gov/ai.
# kind: html | pdf | text

pages:
  - id: state-inventory
    agency: STATE
    label: Department of State 2025 AI Inventory (discloses waived practices)
    url: https://www.state.gov/department-of-state-2025-ai-inventory
    kind: html

  - id: dhs-inventory
    agency: DHS
    label: DHS AI Use Case Inventory page
    url: https://www.dhs.gov/ai/use-case-inventory
    kind: html
    # dhs.gov rejects automated clients at the network edge; this entry is
    # retained so the block is recorded in PAGES.md. DHS use-case data is
    # captured through the OMB consolidated inventory pipeline.

  - id: eeoc-compliance-plan
    agency: EEOC
    label: EEOC Compliance Plan for M-25-21
