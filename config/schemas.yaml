source:
  url: "https://api.github.com/repos/ombegov/2025-Federal-Agency-AI-Use-Case-Inventory/contents/Data/2025_individually_reported_AI_use_cases.csv"

schema_year: "2025"

schemas:
  "2025":
    uid: "Use Case ID"
    agency: "Agency"
    bureau: "Bureau / Component"
    name: "Use Case Name"
    stage: "Stage of Development"
    impact_status: "High-Impact Status"
    description: "Intended Purpose and Expected Benefits"

matching:
  rename_threshold: 0.85
  review_threshold: 0.70

impact_normalization:
  "high-impact": "high-impact"
  "presumed high-impact, but determined not high-impact": "declassified"
  "presumed high-impact but determined not high-impact": "declassified"
  "not high-impact": "not-high-impact"
