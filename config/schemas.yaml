source:
  url: "https://api.github.com/repos/ombegov/2025-Federal-Agency-AI-Use-Case-Inventory/contents/Data/2025_individually_reported_AI_use_cases.csv"

schema_year: "2025"

schemas:
  "2025":
    uid: "id"
    agency: "agency"
    bureau: "agency_bureau"
    name: "use_case_name"
    stage: "development_stage"
    impact_status: "is_high_impact"
    description: "benefits"
    extra:
      topic_area: "topic_area"
      classification: "classification"
      vendor: "vendor_name"
      contracting: "contracting_usage"
      withheld: "is_withheld"
      operational_date: "operational_date"
      has_pii: "has_pii"
      demographic_features: "demographic_features"
      justification: "HI_justification"
      hi_assessment_completed: "hi_assessment_completed"
      hi_testing_conducted: "hi_testing_conducted"
      hi_potential_impacts: "hi_potential_impacts"
      hi_independent_review: "hi_independent_review"
      hi_ongoing_monitoring: "hi_ongoing_monitoring"
      hi_training_established: "hi_training_established"
      hi_failsafe_presence: "hi_failsafe_presence"
      hi_appeal_process: "hi_appeal_process"
      hi_public_consultation: "hi_public_consultation"

text_fields:
  - "description"
  - "justification"
  - "hi_potential_impacts"

matching:
  rename_threshold: 0.85
  review_threshold: 0.70

impact_normalization:
  "high-impact": "high-impact"
  "presumed high-impact, but determined not high-impact": "declassified"
  "presumed high-impact but determined not high-impact": "declassified"
  "not high-impact": "not-high-impact"
